<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>내 프로필</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<h2>내 프로필</h2>

<form id="profileForm">

<input
type="text"
id="name"
placeholder="이름">

<input
type="text"
id="phone"
placeholder="전화번호">

<input
type="date"
id="birth">

<input
type="text"
id="address"
placeholder="주소">

<select id="gender">

<option value="남">남</option>

<option value="여">여</option>

</select>

<input
type="text"
id="department"
placeholder="부서">

<input
type="text"
id="position"
placeholder="직분">

<button type="submit">

저장하기

</button>

</form>

<script type="module"
src="js/profile.js"></script>
<p>

이메일 인증 상태 :

<span id="verifyStatus"></span>

</p>

</body>

</html>
