<div class="login-box">

<div class="card">

<h2 align="center">회원가입</h2>

<br>

<form id="signupForm">

<label>아이디</label>

<input
type="text"
id="userid"
placeholder="아이디를 입력하세요"
required>

<br><br>

<label>비밀번호</label>

<input
type="password"
id="password"
placeholder="비밀번호를 입력하세요"
required>

<br><br>

<label>비밀번호 확인</label>

<input
type="password"
id="password2"
placeholder="비밀번호를 다시 입력하세요"
required>

<br><br>

<label>이름</label>

<input
type="text"
id="name"
placeholder="이름"
required>

<br><br>

<label>이메일</label>

<input
type="email"
id="email"
placeholder="example@email.com"
required>

<br><br>

<label>휴대전화</label>

<input
type="tel"
id="phone"
placeholder="010-0000-0000"
required>

<br><br>

<label>생년월일</label>

<input
type="date"
id="birthday">

<br><br>

<label>성별</label>

<select id="gender">

<option value="">선택하세요</option>

<option>남성</option>

<option>여성</option>

</select>

<br><br>

<label>

<input type="checkbox" id="agree" required>

개인정보 처리방침에 동의합니다.

</label>

<br><br>

<button type="submit">

회원가입

</button>

</form>

<br>

<hr>

<br>

<a href="login.html">

<script src="js/app.js"></script>

<script>

const form=document.getElementById("signupForm");

form.addEventListener("submit",function(e){

e.preventDefault();

const id=document.getElementById("userid").value.trim();

const pw=document.getElementById("password").value;

const pw2=document.getElementById("password2").value;

const name=document.getElementById("name").value.trim();

const email=document.getElementById("email").value.trim();

const phone=document.getElementById("phone").value.trim();

const agree=document.getElementById("agree").checked;

if(id===""){

alert("아이디를 입력하세요.");

return;

}

if(pw.length<8){

alert("비밀번호는 8자 이상 입력하세요.");

return;

}

if(pw!==pw2){

alert("비밀번호가 일치하지 않습니다.");

return;

}

if(name===""){

alert("이름을 입력하세요.");

return;

}

if(email===""){

alert("이메일을 입력하세요.");

return;

}

if(phone===""){

alert("휴대전화 번호를 입력하세요.");

return;

}

if(!agree){

alert("개인정보 처리방침에 동의해주세요.");

return;

}
